<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バドミントン 試合管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f14; --surface: #181920; --surface2: #21222e;
  --border: rgba(255,255,255,0.12); --accent: #6ee7b7; --accent3: #fbbf24;
  --text: #e8eaf0; --text-muted: #8b8fa8; --red: #f87171; --blue: #60a5fa;
  --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

.sync-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: var(–accent); transform: scaleX(0); transform-origin: left; transition: transform 0.3s; z-index: 999; }
.sync-bar.active { transform: scaleX(1); }

.header { background: var(–surface); border-bottom: 1px solid var(–border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.header-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
.logo-icon { width: 28px; height: 28px; background: var(–accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.sync-status { font-size: 11px; color: var(–text-muted); display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(–text-muted); transition: background 0.3s; }
.sync-dot.connected { background: var(–accent); }
.header-stats { display: flex; gap: 1.5rem; }
.hstat { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: var(–text-muted); }
.hstat-num { font-family: ‘DM Mono’, monospace; font-size: 18px; font-weight: 500; color: var(–accent); line-height: 1.1; }

.tabs { display: flex; background: #181920; border-bottom: 2px solid rgba(255,255,255,0.2); padding: 0 1rem; overflow-x: auto; gap: 4px; position: sticky; top: 0; z-index: 200; box-shadow: 0 6px 0 0 #181920, 0 8px 16px rgba(0,0,0,0.8); }
.tab { padding: 14px 16px; font-size: 13px; font-weight: 500; color: var(–text-muted); cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color 0.15s, border-color 0.15s; }
.tab:hover { color: var(–text); }
.tab.active { color: var(–accent); border-bottom-color: var(–accent); font-weight: 700; }

.main { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
.section { display: none; }
.section.active { display: block; }

.card { background: var(–surface); border: 2px solid rgba(255,255,255,0.18); border-radius: var(–radius); padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(–text-muted); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.07); }

.input-row { display: flex; gap: 8px; margin-bottom: 8px; }
input[type=text], input[type=number], input[type=date] { flex: 1; padding: 10px 12px; background: var(–surface2); border: 1px solid var(–border); border-radius: var(–radius-sm); color: var(–text); font-size: 14px; font-family: ‘Noto Sans JP’, sans-serif; outline: none; transition: border-color 0.15s; }
input[type=text]:focus, input[type=number]:focus, input[type=date]:focus { border-color: var(–accent); }
input[type=number] { text-align: center; flex: none; }
input[type=date] { color-scheme: dark; }

.btn { padding: 10px 18px; border-radius: var(–radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.18); background: var(–surface2); color: var(–text); transition: all 0.15s; white-space: nowrap; font-family: ‘Noto Sans JP’, sans-serif; }
.btn:hover { border-color: var(–accent); color: var(–accent); }
.btn-accent { background: var(–accent); color: #0a1a12; border-color: var(–accent); font-weight: 700; }
.btn-accent:hover { opacity: 0.85; color: #0a1a12; }
.btn-sm { padding: 6px 14px; font-size: 12px; border: 1.5px solid rgba(255,255,255,0.18); }
.btn-danger { border-color: rgba(248,113,113,0.6); color: var(–red); }
.btn-danger:hover { background: rgba(248,113,113,0.1); }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 10px; margin-bottom: 1rem; }
.stat-card { background: var(–surface); border: 1px solid var(–border); border-radius: var(–radius-sm); padding: 14px 12px; text-align: center; }
.stat-num { font-family: ‘DM Mono’, monospace; font-size: 28px; font-weight: 500; color: var(–accent); line-height: 1; }
.stat-label { font-size: 11px; color: var(–text-muted); margin-top: 4px; }

.fmt-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
.fmt-btn { padding: 9px 18px; border-radius: 100px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.18); background: var(–surface2); color: var(–text-muted); transition: all 0.15s; font-family: ‘Noto Sans JP’, sans-serif; }
.fmt-btn:hover { border-color: rgba(255,255,255,0.35); color: var(–text); }
.fmt-btn.selected { background: rgba(110,231,183,0.15); border-color: var(–accent); color: var(–accent); font-weight: 700; }
.fmt-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

.member-table { width: 100%; border-collapse: collapse; }
.member-table th { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(–text-muted); text-align: left; padding: 8px 10px; border-bottom: 2px solid var(–accent); }
.member-table td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 14px; vertical-align: middle; }
.member-table tr:last-child td { border-bottom: none; }
.member-table tr:hover td { background: rgba(255,255,255,0.02); }

.toggle-switch { width: 44px; height: 24px; border-radius: 12px; background: var(–surface2); border: 2px solid rgba(255,255,255,0.2); position: relative; cursor: pointer; transition: background 0.2s, border-color 0.2s; flex-shrink: 0; }
.toggle-switch.on { background: var(–accent); border-color: var(–accent); }
.toggle-knob { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.5); position: absolute; top: 2px; left: 2px; transition: left 0.2s, background 0.2s; }
.toggle-switch.on .toggle-knob { left: 22px; background: #0a1a12; }

.badge-exp { background: rgba(110,231,183,0.13); color: var(–accent); border: 1px solid rgba(110,231,183,0.3); font-size: 11px; padding: 2px 9px; border-radius: 100px; font-weight: 700; }
.badge-nov { background: rgba(96,165,250,0.13); color: var(–blue); border: 1px solid rgba(96,165,250,0.3); font-size: 11px; padding: 2px 9px; border-radius: 100px; font-weight: 700; }

.match-item { background: var(–surface); border: 2px solid rgba(255,255,255,0.15); border-radius: var(–radius-sm); padding: 12px 14px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr auto; gap: 6px 12px; transition: border-color 0.15s; }
.match-item.playing { border-color: var(–accent3); }
.match-item.done { opacity: 0.7; border-color: rgba(255,255,255,0.08); }
.match-left { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.match-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 8px; }
.match-team { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.match-meta { font-size: 11px; color: var(–text-muted); font-family: ‘DM Mono’, monospace; }
.match-score { display: flex; align-items: center; gap: 6px; }
.match-score input { width: 56px; text-align: center; padding: 8px 4px; font-family: ‘DM Mono’, monospace; font-size: 22px; font-weight: 700; background: var(–surface2); border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; color: var(–text); outline: none; }
.match-score input:focus { border-color: var(–accent); }
.vs { font-size: 12px; color: var(–text-muted); }
.match-status-row { display: flex; align-items: center; gap: 8px; }
.status-sel { padding: 6px 10px; background: var(–surface2); border: 1.5px solid rgba(255,255,255,0.2); border-radius: var(–radius-sm); color: var(–text); font-size: 12px; font-family: ‘Noto Sans JP’, sans-serif; cursor: pointer; outline: none; }
.badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 100px; letter-spacing: 0.04em; }
.badge-wait { background: var(–surface2); color: var(–text-muted); }
.badge-playing { background: rgba(251,191,36,0.15); color: var(–accent3); border: 1px solid rgba(251,191,36,0.3); }
.badge-done { background: rgba(110,231,183,0.12); color: var(–accent); border: 1px solid rgba(110,231,183,0.3); }

.rank-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
.rank-row:last-child { border-bottom: none; }
.rank-pos { font-family: ‘DM Mono’, monospace; font-size: 13px; font-weight: 500; min-width: 32px; color: var(–text-muted); }
.rank-pos.top { color: var(–accent3); font-size: 16px; }
.rank-name { flex: 1; font-size: 15px; font-weight: 500; }
.rank-wl { font-size: 12px; color: var(–text-muted); min-width: 60px; text-align: right; }
.rank-pts { font-family: ‘DM Mono’, monospace; font-size: 16px; font-weight: 500; color: var(–accent); min-width: 50px; text-align: right; }

.progress-wrap { margin: 8px 0 0; }
.progress-bar-bg { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); }
.progress-bar-fill { height: 100%; background: var(–accent); border-radius: 2px; transition: width 0.4s ease; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(–text-muted); margin-top: 4px; }

.empty { text-align: center; color: var(–text-muted); padding: 2rem 0; font-size: 14px; }

.loading { position: fixed; inset: 0; background: var(–bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 9999; }
.loading-spinner { width: 36px; height: 36px; border: 3px solid var(–border); border-top-color: var(–accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(–text-muted); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9000; padding: 1.5rem; }
.modal-card { background: var(–surface); border: 2px solid rgba(255,255,255,0.18); border-radius: var(–radius); padding: 1.5rem; width: 100%; max-width: 320px; }
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 1rem; }
.modal-error { font-size: 12px; color: var(–red); min-height: 18px; margin-bottom: 0.5rem; }

@media (max-width: 600px) {
.header-stats { display: none; }
.main { padding: 1rem; }
}
</style>

</head>
<body>

<div class="sync-bar" id="sync-bar"></div>

<!-- 活動日設定モーダル -->

<div class="modal-overlay" id="date-modal" style="display:none" onclick="closeDateModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-title">🔒 活動日の変更</div>
    <div style="margin-bottom:0.75rem">
      <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">パスワード</label>
      <input type="password" id="modal-pw" placeholder="パスワードを入力"
        style="width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none"
        onkeydown="if(event.key==='Enter')confirmDateModal()">
    </div>
    <div style="margin-bottom:0.75rem">
      <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">活動日</label>
      <input type="date" id="modal-date"
        style="width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none;color-scheme:dark"
        onkeydown="if(event.key==='Enter')confirmDateModal()">
    </div>
    <div class="modal-error" id="modal-error"></div>
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="closeDateModal()">キャンセル</button>
      <button class="btn btn-accent" style="flex:1" onclick="confirmDateModal()">設定</button>
    </div>
  </div>
</div>
<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">接続中...</div>
</div>

<header class="header">
  <div class="header-logo">
    <div class="logo-icon">🏸</div>
    バドミントン 試合管理
  </div>
  <div style="display:flex;align-items:center;gap:1.5rem">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">接続中...</span>
    </div>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-num" id="h-attend">0</div>参加</div>
      <div class="hstat"><div class="hstat-num" id="h-matches">0</div>試合</div>
      <div class="hstat"><div class="hstat-num" id="h-done">0</div>終了</div>
    </div>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" onclick="showTab('attendance')">📋 出欠</button>
  <button class="tab" onclick="showTab('members')">👥 メンバー</button>
  <button class="tab" onclick="showTab('matches')">🎯 組み合わせ</button>
  <button class="tab" onclick="showTab('results')">🏆 結果・順位</button>
  <button class="tab" onclick="showTab('party')">🍻 懇親会</button>
</nav>

<main class="main">

<!-- ATTENDANCE -->

<div id="sec-attendance" class="section active">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="att-yes" style="color:var(--accent)">0</div><div class="stat-label">参加</div></div>
    <div class="stat-card"><div class="stat-num" id="att-no" style="color:var(--red)">0</div><div class="stat-label">不参加</div></div>
    <div class="stat-card"><div class="stat-num" id="att-undecided" style="color:var(--accent3)">0</div><div class="stat-label">未定</div></div>
  </div>

  <div class="card">
    <div class="card-title">活動日設定</div>
    <div id="activity-date-display" style="font-size:13px;color:var(--text-muted);margin-bottom:0.75rem">活動日が設定されていません</div>
    <button class="btn btn-accent" onclick="openDateModal()" style="width:100%">活動日を変更する</button>
  </div>

  <div class="card">
    <div class="card-title">出欠入力</div>
    <div class="input-row">
      <input type="text" id="att-name-input" placeholder="名前を入力">
    </div>
    <div class="fmt-group" style="margin-bottom:0">
      <button class="fmt-btn" onclick="submitAttendance('yes')" style="color:var(--accent);border-color:rgba(110,231,183,0.4)">参加</button>
      <button class="fmt-btn" onclick="submitAttendance('no')" style="color:var(--red);border-color:rgba(248,113,113,0.4)">不参加</button>
      <button class="fmt-btn" onclick="submitAttendance('undecided')" style="color:var(--accent3);border-color:rgba(251,191,36,0.4)">未定</button>
    </div>
  </div>

  <div class="card" id="att-result-card" style="display:none">
    <div class="card-title">参加メンバー一覧</div>
    <div id="att-result-text" style="font-size:14px;line-height:2;white-space:pre-wrap"></div>
    <button class="btn btn-accent" style="width:100%;margin-top:1rem" onclick="copyAttendance()">テキストをコピー</button>
  </div>

  <div class="card">
    <div class="card-title">回答一覧</div>
    <table class="member-table" id="attendance-list"></table>
  </div>

  <div style="text-align:center;margin-top:0.5rem">
    <button class="btn btn-sm btn-danger" onclick="resetAttendance()">出欠をリセット</button>
  </div>
</div>

<!-- MEMBERS -->

<div id="sec-members" class="section">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="cnt-members">0</div><div class="stat-label">今日の参加者</div></div>
    <div class="stat-card"><div class="stat-num" id="cnt-exp" style="color:var(--accent)">0</div><div class="stat-label">経験者</div></div>
    <div class="stat-card"><div class="stat-num" id="cnt-nov" style="color:var(--blue)">0</div><div class="stat-label">未経験者</div></div>
    <div class="stat-card"><div class="stat-num" id="cnt-courts">2</div><div class="stat-label">コート数</div></div>
  </div>

  <div class="card">
    <div class="card-title">コート数</div>
    <div class="input-row" style="align-items:center;gap:10px">
      <input type="number" id="court-input" min="1" max="20" value="2"
        style="width:90px;font-size:18px;font-family:'DM Mono',monospace;font-weight:500"
        oninput="updateCourts(this.value)">
      <span style="font-size:13px;color:var(--text-muted)">コート</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今日の参加者 — 経験者 / 未経験者を設定</div>
    <table class="member-table" id="member-list"></table>
  </div>
</div>

<!-- MATCHES -->

<div id="sec-matches" class="section">
  <div class="card">
    <div class="card-title">参加枠</div>
    <div class="fmt-group" id="tier-filter">
      <button class="fmt-btn selected" data-v="all">全員</button>
      <button class="fmt-btn" data-v="exp">経験者のみ</button>
      <button class="fmt-btn" data-v="nov">未経験者のみ</button>
    </div>
    <div class="card-title">試合形式</div>
    <div class="fmt-group" id="match-type">
      <button class="fmt-btn selected" data-v="singles">シングルス</button>
      <button class="fmt-btn" data-v="doubles">ダブルス</button>
    </div>
    <div class="card-title">大会形式</div>
    <div class="fmt-group" id="tourney-type">
      <button class="fmt-btn selected" data-v="rr">総当たり</button>
      <button class="fmt-btn" data-v="random" id="btn-random">ランダムマッチ</button>
    </div>
    <div class="card-title" style="margin-top:0.75rem">合計試合数の上限（任意）</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:0.75rem">
      <!-- 1人あたり◯試合（将来実装）
      <input type="number" id="limit-per-person" min="1" max="99" placeholder="1人あたり">
      -->
      <input type="number" id="limit-per-person" style="display:none">
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:13px;color:var(--text-muted);white-space:nowrap">合計</label>
        <input type="number" id="limit-total" min="1" max="9999" placeholder="制限なし" style="width:110px" oninput="updateEst()">
        <span style="font-size:13px;color:var(--text-muted)">試合</span>
      </div>
    </div>
    <div id="est-note" style="font-size:12px;color:var(--text-muted);margin-bottom:0.75rem"></div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:0.75rem">予定試合数：<span id="cnt-est" style="font-family:'DM Mono',monospace;font-size:16px;color:var(--accent)">0</span></div>
    <button class="btn btn-accent" style="width:100%" onclick="generateMatches()">組み合わせを生成</button>
  </div>

  <div id="match-progress" style="display:none" class="card">
    <div class="card-title">進行状況</div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
      <div class="progress-label">
        <span id="prog-text">0 / 0 試合終了</span>
        <span id="prog-pct">0%</span>
      </div>
    </div>
  </div>

  <div id="match-list"></div>
</div>

<!-- RESULTS -->

<div id="sec-results" class="section">
  <div id="results-area">
    <div class="empty">試合を組み合わせてから結果を入力してください</div>
  </div>
</div>

<!-- PARTY -->

<div id="sec-party" class="section">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="party-yes" style="color:var(--accent)">0</div><div class="stat-label">参加</div></div>
    <div class="stat-card"><div class="stat-num" id="party-no" style="color:var(--red)">0</div><div class="stat-label">不参加</div></div>
    <div class="stat-card"><div class="stat-num" id="party-pending" style="color:var(--text-muted)">0</div><div class="stat-label">未回答</div></div>
  </div>
  <div class="card" style="padding-bottom:0.75rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid rgba(255,255,255,0.07)">
      <div class="card-title" style="margin-bottom:0;padding-bottom:0;border-bottom:none">懇親会参加確認</div>
      <button class="btn btn-sm" id="party-toggle-btn" onclick="togglePartyShowAll()">回答済みを表示</button>
    </div>
    <table class="member-table" id="party-list"></table>
  </div>
</div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── 状態 ──
  attendance: { [name]: 'yes'|'no'|'undecided' }  出欠データ

/* ── Firebase helpers ── */
function syncBar(on) { document.getElementById('sync-bar').classList.toggle('active', on); }

async function fbSet(path, value) {
  writeCount++;
  syncBar(true);
  await set(ref(db, `${ROOT}/${path}`), value);
  writeCount--;
  if (writeCount === 0) syncBar(false);
}
async function fbUpdate(path, value) {
  writeCount++;
  syncBar(true);
  await update(ref(db, `${ROOT}/${path}`), value);
  writeCount--;
  if (writeCount === 0) syncBar(false);
}

/* ── リアルタイム受信 ── */
onValue(ref(db, ROOT), snap => {
  if (writeCount > 0) return;
  const data = snap.val() || {};

  attendance   = data.attendance   || {};
  memberLevels = data.memberLevels || {};
  courts       = data.courts       ?? 2;
  activityDate = data.activityDate || '';
  party        = data.party        || {};

  // matches
  matches = data.matches ? Object.values(data.matches) : [];

  // 活動日から1週間後に自動リセット
  if (activityDate) {
    const deadline = new Date(activityDate);
    deadline.setDate(deadline.getDate() + 7);
    if (new Date() > deadline) {
      fbSet('attendance', {});
      fbSet('activityDate', '');
      fbSet('party', {});
      attendance = {};
      activityDate = '';
      party = {};
    }
  }

  const ci = document.getElementById('court-input');
  if (ci && parseInt(ci.value) !== courts) ci.value = courts;
  document.getElementById('cnt-courts').textContent = courts;

  // 活動日表示
  updateActivityDateDisplay();

  renderAttendance();
  renderMembers();
  renderMatchList();
  updateHeaderStats();
  if (document.getElementById('sec-results').classList.contains('active')) renderResults();
  if (document.getElementById('sec-party').classList.contains('active')) renderPartyList();
  document.getElementById('loading').style.display = 'none';
});

onValue(ref(db, '.info/connected'), snap => {
  const ok = snap.val() === true;
  document.getElementById('sync-dot').classList.toggle('connected', ok);
  document.getElementById('sync-label').textContent = ok ? 'リアルタイム同期中' : '切断中';
});

/* ── ヘッダー更新 ── */
function updateHeaderStats() {
  const attendees = Object.keys(attendance).filter(n => attendance[n] === 'yes');
  const done = matches.filter(m => m.status === 'done').length;
  document.getElementById('h-attend').textContent  = attendees.length;
  document.getElementById('h-matches').textContent = matches.length;
  document.getElementById('h-done').textContent    = done;
  document.getElementById('cnt-members').textContent = attendees.length;

  const prog = document.getElementById('match-progress');
  if (matches.length > 0) {
    prog.style.display = 'block';
    const pct = Math.round(done / matches.length * 100);
    document.getElementById('prog-bar').style.width  = pct + '%';
    document.getElementById('prog-text').textContent = `${done} / ${matches.length} 試合終了`;
    document.getElementById('prog-pct').textContent  = pct + '%';
  } else {
    prog.style.display = 'none';
  }
}

/* ── Pool / Est ── */
function getPool() {
  const attendees = getAttendees();
  if (tierFilter === 'exp') return attendees.filter(n => memberLevels[n] === 'exp');
  if (tierFilter === 'nov') return attendees.filter(n => memberLevels[n] !== 'exp');
  return attendees;
}

function updateEst() {
  const pool = getPool(); const n = pool.length;
  let base = matchType === 'singles'
    ? Math.floor(n*(n-1)/2)
    : Math.ceil(n/4);
  const total = parseInt(document.getElementById('limit-total')?.value) || 0;
  let cap = base;
  if (total > 0) cap = Math.min(cap, total);
  document.getElementById('cnt-est').textContent = Math.max(0, cap);
  const note = document.getElementById('est-note');
  if (note) {
    const parts = [];
    if (total > 0 && base !== cap) parts.push(`最大 ${base} 試合`);
    if (total > 0) parts.push(`合計上限 ${total} 試合`);
    note.textContent = parts.join('　／　');
  }
}

/* ── shuffle ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ── 生成 ── */
window.generateMatches = () => {
  const pool = getPool();
  if (pool.length < 2) { alert('対象メンバーが2人以上いません。'); return; }
  const limitTotal = parseInt(document.getElementById('limit-total').value) || 0;
  const minMatches = matchType === 'singles' ? Math.ceil(pool.length/2) : Math.ceil(pool.length/4);
  if (limitTotal > 0 && limitTotal < minMatches) {
    if (!confirm(`設定した試合数では全員が最低1試合できません。\n（必要最小試合数：${minMatches}試合）\nこのまま続けますか？`)) return;
  }
  matchType === 'singles'
    ? generateSingles(pool, limitTotal)
    : generateDoubles(pool, limitTotal);
  let courtNum = 1;
  matches.forEach(mx => { mx.court = courtNum; courtNum = courtNum >= courts ? 1 : courtNum+1; });
  const obj = {}; matches.forEach((m, i) => { obj[i] = m; });
  fbSet('matches', obj);
  renderMatchList();
  updateHeaderStats();
};

function generateSingles(pool, limitTotal) {
  const m = shuffle(pool);
  let candidates = [];
  for (let i = 0; i < m.length; i++)
    for (let j = i+1; j < m.length; j++) candidates.push({ p1:m[i], p2:m[j] });
  candidates = shuffle(candidates);
  if (limitTotal > 0) candidates = candidates.slice(0, limitTotal);
  matches = candidates.map(c => ({ ...c, s1:'', s2:'', status:'wait', court:0 }));
}

function generateDoubles(pool, limitTotal) {
  const maxGames = limitTotal > 0 ? limitTotal : 99999;
  const playCount = {}; pool.forEach(p => { playCount[p]=0; });
  const pairHist = {};
  const pKey  = (a,b) => [a,b].sort().join('__');
  const gPair = (a,b) => pairHist[pKey(a,b)] || 0;
  const aPair = (a,b) => { const k=pKey(a,b); pairHist[k]=(pairHist[k]||0)+1; };
  const score = (t1,t2) => gPair(t1[0],t1[1]) + gPair(t2[0],t2[1]);
  const best3 = four => {
    const opts = [
      {t1:[four[0],four[1]], t2:[four[2],four[3]]},
      {t1:[four[0],four[2]], t2:[four[1],four[3]]},
      {t1:[four[0],four[3]], t2:[four[1],four[2]]},
    ];
    opts.sort((a,b) => score(a.t1,a.t2) - score(b.t1,b.t2));
    return opts[0];
  };
  const generated = []; let failStreak = 0;
  while (generated.length < maxGames && failStreak < 30) {
    const avail = shuffle(pool).sort((a,b) => playCount[a]-playCount[b]);
    if (avail.length < 4) break;
    let best = best3(avail.slice(0,4));
    if (gPair(best.t1[0],best.t1[1]) > 0 || gPair(best.t2[0],best.t2[1]) > 0) {
      const wider = shuffle(avail.slice(0,Math.min(8,avail.length))).slice(0,4);
      best = best3(wider);
      if (gPair(best.t1[0],best.t1[1]) > 0 || gPair(best.t2[0],best.t2[1]) > 0) { failStreak++; continue; }
    }
    aPair(best.t1[0],best.t1[1]); aPair(best.t2[0],best.t2[1]);
    [...best.t1,...best.t2].forEach(p => playCount[p]++);
    generated.push({ p1:best.t1.join(' / '), p2:best.t2.join(' / '), s1:'', s2:'', status:'wait', court:0 });
    failStreak = 0;
  }
  if (!generated.length) { alert('条件を満たす組み合わせが見つかりませんでした。'); return; }
  matches = generated;
}

/* ── 試合リスト ── */
function renderMatchList() {
  const el = document.getElementById('match-list');
  if (!matches.length) { el.innerHTML = '<div class="empty">試合がありません</div>'; return; }
  el.innerHTML = matches.map((m, i) => `
  <div class="match-item ${m.status}" id="mi-${i}">
    <div class="match-left">
      <div class="match-team">${m.p1}</div>
      <div class="match-meta">#${String(i+1).padStart(2,'0')}　C${m.court}</div>
      <div class="match-team">${m.p2}</div>
    </div>
    <div class="match-right">
      <div class="match-score">
        <input type="number" min="0" max="99" value="${m.s1||''}" placeholder="0" onchange="updateScore(${i},1,this.value)">
        <span class="vs">vs</span>
        <input type="number" min="0" max="99" value="${m.s2||''}" placeholder="0" onchange="updateScore(${i},2,this.value)">
      </div>
      <div class="match-status-row">
        <select class="status-sel" onchange="updateStatus(${i},this.value)">
          <option value="wait"    ${m.status==='wait'   ?'selected':''}>待機中</option>
          <option value="playing" ${m.status==='playing'?'selected':''}>試合中</option>
          <option value="done"    ${m.status==='done'   ?'selected':''}>終了</option>
        </select>
        <span class="badge badge-${m.status}">${m.status==='done'?'終了':m.status==='playing'?'試合中':'待機'}</span>
      </div>
    </div>
  </div>`).join('');
  updateHeaderStats();
}

window.updateScore = (i, side, v) => {
  if (side===1) matches[i].s1=v; else matches[i].s2=v;
  fbUpdate(`matches/${i}`, { s1:matches[i].s1, s2:matches[i].s2 });
};

window.updateStatus = (i, v) => {
  matches[i].status = v;
  fbUpdate(`matches/${i}`, { status: v });
  const el = document.getElementById('mi-'+i);
  if (el) {
    el.className = 'match-item '+v;
    const badge = el.querySelector('.badge');
    badge.className = 'badge badge-'+v;
    badge.textContent = v==='done'?'終了':v==='playing'?'試合中':'待機';
  }
  updateHeaderStats();
};

/* ── 結果・順位 ── */
function renderResults() {
  const attendees = getAttendees();
  if (!matches.length) {
    document.getElementById('results-area').innerHTML = '<div class="empty">試合を組み合わせてから結果を入力してください</div>';
    return;
  }
  const wins = {};
  attendees.forEach(n => { wins[n] = { w:0, l:0, d:0, pts:0, pf:0, pa:0, level: memberLevels[n]||'nov' }; });
  matches.forEach(m => {
    if (m.status !== 'done') return;
    const s1=parseInt(m.s1)||0, s2=parseInt(m.s2)||0;
    const p1=m.p1.split(' / '), p2=m.p2.split(' / ');
    p1.forEach(p => { if(wins[p]){wins[p].pf+=s1;wins[p].pa+=s2;} });
    p2.forEach(p => { if(wins[p]){wins[p].pf+=s2;wins[p].pa+=s1;} });
    if (s1>s2) {
      p1.forEach(p => { if(wins[p]){wins[p].w++;wins[p].pts+=2;} });
      p2.forEach(p => { if(wins[p]) wins[p].l++; });
    } else if (s2>s1) {
      p2.forEach(p => { if(wins[p]){wins[p].w++;wins[p].pts+=2;} });
      p1.forEach(p => { if(wins[p]) wins[p].l++; });
    } else {
      p1.forEach(p => { if(wins[p]){wins[p].d++;wins[p].pts++;} });
      p2.forEach(p => { if(wins[p]){wins[p].d++;wins[p].pts++;} });
    }
  });
  const ranked = attendees.slice().sort((a,b) =>
    wins[b].pts-wins[a].pts || wins[b].w-wins[a].w || (wins[b].pf-wins[b].pa)-(wins[a].pf-wins[a].pa)
  );
  const done    = matches.filter(m=>m.status==='done').length;
  const playing = matches.filter(m=>m.status==='playing').length;
  const pct     = matches.length ? Math.round(done/matches.length*100) : 0;

  document.getElementById('results-area').innerHTML = `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${matches.length}</div><div class="stat-label">総試合数</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${done}</div><div class="stat-label">終了</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent3)">${playing}</div><div class="stat-label">試合中</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--text-muted)">${matches.length-done-playing}</div><div class="stat-label">残り</div></div>
  </div>
  <div class="card">
    <div class="card-title">進行状況</div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label"><span>${done} / ${matches.length} 試合終了</span><span>${pct}%</span></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">順位表</div>
    ${ranked.map((n,i) => `
    <div class="rank-row">
      <div class="rank-pos ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'位'}</div>
      <div class="rank-name">
        <div>${n}</div>
        <div style="margin-top:3px">${wins[n].level==='exp'?'<span class="badge-exp">経験者</span>':'<span class="badge-nov">未経験者</span>'}</div>
      </div>
      <div class="rank-wl">${wins[n].w}勝${wins[n].l}敗${wins[n].d?wins[n].d+'分':''}</div>
      <div class="rank-pts">${wins[n].pts}<span style="font-size:11px;color:var(--text-muted)">pt</span></div>
    </div>`).join('')}
  </div>
  <div style="font-size:11px;color:var(--text-muted);text-align:center;padding:0.5rem 0">
    勝利 +2pt ／ 引き分け +1pt ／ 敗北 +0pt
  </div>`;
}

/* ── 懇親会 ── */
window.setParty = (name, val) => {
  party[name] = party[name] === val ? '' : val;
  fbSet('party', party);
  renderPartyList();
};

let showPartyAll = false;
window.togglePartyShowAll = () => {
  showPartyAll = !showPartyAll;
  const btn = document.getElementById('party-toggle-btn');
  if (btn) btn.textContent = showPartyAll ? '未回答のみ表示' : '回答済みを表示';
  renderPartyList();
};

function renderPartyList() {
  const attendees = getAttendees();
  const el = document.getElementById('party-list');
  if (!el) return;
  const yes     = attendees.filter(n => party[n] === 'yes').length;
  const no      = attendees.filter(n => party[n] === 'no').length;
  const pending = attendees.filter(n => !party[n] || (party[n] !== 'yes' && party[n] !== 'no')).length;
  document.getElementById('party-yes').textContent     = yes;
  document.getElementById('party-no').textContent      = no;
  document.getElementById('party-pending').textContent = pending;

  if (!attendees.length) {
    el.innerHTML = '<tr><td colspan="2" class="empty">出欠タブで参加者を登録してください</td></tr>';
    return;
  }

  const answered   = attendees.filter(n => party[n] === 'yes' || party[n] === 'no');
  const unanswered = attendees.filter(n => !party[n] || (party[n] !== 'yes' && party[n] !== 'no'));
  const allDone    = unanswered.length === 0;

  const btnHtml = (name) => `
    <button onclick="setParty('${name}','yes')" style="padding:5px 10px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid ${party[name]==='yes'?'var(--accent)':'rgba(255,255,255,0.2)'};background:${party[name]==='yes'?'rgba(110,231,183,0.2)':'var(--surface2)'};color:${party[name]==='yes'?'var(--accent)':'var(--text-muted)'};font-family:'Noto Sans JP',sans-serif">参加</button>
    <button onclick="setParty('${name}','no')" style="padding:5px 10px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid ${party[name]==='no'?'var(--red)':'rgba(255,255,255,0.2)'};background:${party[name]==='no'?'rgba(248,113,113,0.15)':'var(--surface2)'};color:${party[name]==='no'?'var(--red)':'var(--text-muted)'};font-family:'Noto Sans JP',sans-serif">不参加</button>`;

  if (allDone && !showPartyAll) {
    const yesList = attendees.filter(n => party[n] === 'yes');
    const noList  = attendees.filter(n => party[n] === 'no');
    el.innerHTML = `
      <tr><th colspan="2" style="text-align:center;padding:14px;color:var(--accent);font-size:13px;border-bottom:2px solid var(--accent)">🎉 全員回答完了！</th></tr>
      <tr><td colspan="2" style="padding:12px 8px">
        <div style="margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.06em;margin-bottom:6px">参加 ${yesList.length}人</div>
          <div style="font-size:14px;line-height:2">${yesList.join('　') || '—'}</div>
        </div>
        <div style="border-top:1px solid rgba(255,255,255,0.08);padding-top:12px">
          <div style="font-size:11px;font-weight:700;color:var(--red);letter-spacing:0.06em;margin-bottom:6px">不参加 ${noList.length}人</div>
          <div style="font-size:14px;line-height:2">${noList.join('　') || '—'}</div>
        </div>
        <div style="border-top:1px solid rgba(255,255,255,0.08);padding-top:10px;margin-top:4px">
          <button class="btn btn-sm btn-danger" onclick="resetParty()" style="width:100%">回答をリセット</button>
        </div>
      </td></tr>`;
    return;
  }

  if (showPartyAll) {
    el.innerHTML = answered.length
      ? '<tr><th>回答済み</th><th>参加</th></tr>' + answered.map(n => `
        <tr style="display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06);padding:8px 4px;gap:6px">
          <td style="font-weight:500;font-size:13px;flex:1;border:none;padding:0">${n}</td>
          <td style="border:none;padding:0;display:flex;gap:4px;flex-shrink:0">${btnHtml(n)}</td>
        </tr>`).join('')
      : '<tr><td colspan="2" class="empty" style="padding:1.5rem 0">回答済みのメンバーがいません</td></tr>';
    return;
  }

  el.innerHTML = unanswered.length
    ? '<tr><th>未回答</th><th>参加</th></tr>' + unanswered.map(n => `
      <tr style="display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06);padding:8px 4px;gap:6px">
        <td style="font-weight:500;font-size:13px;flex:1;border:none;padding:0">${n}</td>
        <td style="border:none;padding:0;display:flex;gap:4px;flex-shrink:0">${btnHtml(n)}</td>
      </tr>`).join('')
    : '<tr><td colspan="2" class="empty" style="padding:1.5rem 0">未回答のメンバーがいません</td></tr>';
}

window.resetParty = () => {
  if (!confirm('懇親会の回答をリセットしますか？')) return;
  party = {};
  fbSet('party', {});
  renderPartyList();
};
</script>

</body>
</html>
